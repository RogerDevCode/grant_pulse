services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=grantpulse
      - POSTGRES_USER=grantpulse
      - POSTGRES_DB=grantpulse
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grantpulse -d grantpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    command: ["uvicorn", "src.presentation.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://grantpulse:grantpulse@db:5432/grantpulse
    volumes:
      - .:/app
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    # Ejecuta el cli cada 12 horas asumiendo que el contenedor no muere, pero
    # como la arquitectura pide correrlo 1 o 2 veces al dia, podemos emular un cron con un sleep en un sh
    command: ["sh", "-c", "while true; do python -m src.infra.cli run-all; sleep 43200; done"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://grantpulse:grantpulse@db:5432/grantpulse
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
