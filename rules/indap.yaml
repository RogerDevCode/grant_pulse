nombre: "INDAP"
url_busqueda: "https://www.indap.gob.cl/plataforma-de-servicios/"
estrategia: "html_static"
selectores:
  contenedor_items: ".views-row"
  identificador: ".views-field-title a"
  titulo: ".views-field-title a"
  descripcion: ".views-field-field-resumen-programa"
  link_detalle: ".views-field-title a"
  # NOTA: INDAP no expone estado ni fecha_cierre en la vista de lista.
  # Son programas institucionales permanentes, no convocatorias con fecha de cierre.
  # Se monitorizan cambios de título y descripción únicamente.
  estado: null
  fecha_cierre: null
normalizadores: {}
alertas:
  campos_sensibles: ["titulo"]
  ignorar_cambios_en: ["descripcion"]
